services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      APP_NAME: AlgoMentor AI
      LOG_LEVEL: INFO
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
      CORS_ORIGINS: http://localhost:3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: algomentor
      POSTGRES_USER: algomentor
      POSTGRES_PASSWORD: algomentor_password
      DATABASE_URL: postgresql+psycopg://algomentor:algomentor_password@postgres:5432/algomentor?connect_timeout=5
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      ENABLE_DEV_USER: "true"
      DEV_USER_ID: 00000000-0000-0000-0000-000000000001
      ENABLE_CODE_EXECUTION: ${ENABLE_CODE_EXECUTION:-false}
      JUDGE_BASE_URL: http://judge:9000
      JUDGE_INTERNAL_TOKEN: ${JUDGE_INTERNAL_TOKEN:-}
      JUDGE_REQUEST_TIMEOUT_SECONDS: "60"
      SUBMISSION_MAX_IN_FLIGHT: "2"
      AI_PROVIDER: openai_compatible
      AI_TIMEOUT_SECONDS: "60"
      AI_MAX_RETRIES: "1"
      SECRET_KEY: change-me-in-production-32-bytes-long!!
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - judge_internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: algomentor
      POSTGRES_USER: algomentor
      POSTGRES_PASSWORD: algomentor_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algomentor -d algomentor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  judge-runner-image:
    build:
      context: ./judge/runner
      dockerfile: Dockerfile
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://deb.debian.org/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://deb.debian.org/debian-security}
    image: algomentor-judge-runner:phase10
    command: ["/bin/true"]
    restart: "no"

  judge:
    build:
      context: ./judge
      dockerfile: Dockerfile
    environment:
      JUDGE_INTERNAL_TOKEN: ${JUDGE_INTERNAL_TOKEN:-}
      JUDGE_MAX_CONCURRENT: "2"
      JUDGE_COMPILE_TIMEOUT_SECONDS: "10"
      JUDGE_CASE_TIMEOUT_SECONDS: "2"
      JUDGE_TOTAL_TIMEOUT_SECONDS: "30"
      JUDGE_REQUEST_HARD_TIMEOUT_SECONDS: "50"
      JUDGE_MEMORY_LIMIT_MB: "512"
      JUDGE_CPU_LIMIT: "1"
      JUDGE_CONTAINER_PIDS_LIMIT: "128"
      JUDGE_RUNTIME_PROCESS_LIMIT: "64"
      JUDGE_WORKSPACE_LIMIT_MB: "64"
      JUDGE_OUTPUT_LIMIT_BYTES: "65536"
      JUDGE_RUNNER_IMAGE: algomentor-judge-runner:phase10
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      judge-runner-image:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - judge_internal

volumes:
  backend_venv:
  frontend_node_modules:
  postgres_data:
  redis_data:

networks:
  judge_internal:
    internal: true
