services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      APP_NAME: AlgoMentor AI
      LOG_LEVEL: INFO
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
      CORS_ORIGINS: http://localhost:3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: algomentor
      POSTGRES_USER: algomentor
      POSTGRES_PASSWORD: algomentor_password
      DATABASE_URL: postgresql+psycopg://algomentor:algomentor_password@postgres:5432/algomentor
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379/0
      ENABLE_DEV_USER: "true"
      DEV_USER_ID: 00000000-0000-0000-0000-000000000001
      ENABLE_CODE_EXECUTION: "false"
      AI_PROVIDER: openai_compatible
      AI_TIMEOUT_SECONDS: "60"
      AI_MAX_RETRIES: "1"
      SECRET_KEY: change_me_in_production
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: algomentor
      POSTGRES_USER: algomentor
      POSTGRES_PASSWORD: algomentor_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  postgres_data:
  redis_data:
